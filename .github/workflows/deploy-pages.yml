name: Deploy dashboard to GitHub Pages

# Le dashboard n'est plus committé (cf. BRIEF_dashboard_externalisation.md, étape 1) :
# ce workflow le régénère depuis les artefacts Run/ + validation/tracking.db à chaque
# push touchant les données, puis le publie sur GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - 'Run/**'
      - 'validation/tracking.db'
      - 'model_artifacts/generate_dashboard.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal deps
        run: pip install pandas pyarrow numpy scipy
      - name: Generate dashboard
        run: |
          mkdir -p _site
          python -m model_artifacts.generate_dashboard --out _site/index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
