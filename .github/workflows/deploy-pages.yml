name: Deploy dashboard to GitHub Pages

# Publie Run/dashboard.html sur GitHub Pages (renommé index.html à la racine du
# site) à chaque mise à jour du dashboard, plus déclenchement manuel possible.
# Contourne la limite de l'UI GitHub qui ne rend pas les gros fichiers HTML dans
# la vue repo (ni en "raw", servi en text/plain).

on:
  push:
    branches: [main]
    paths:
      - 'Run/dashboard.html'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage dashboard as site index
        run: |
          mkdir -p _site
          cp Run/dashboard.html _site/index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
